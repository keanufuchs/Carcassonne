<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="300" height="300">
  <rect width="100" height="100" fill="#7fbf6a"/>
  <!-- Ein einziges City-Segment -->
  <polygon
    id="segment-CITY-0"
    points="0,0 50,25 100,0 100,100 50,75 0,100"
    fill="#c9b07a"
    data-kind="CITY"
  />

  <!-- Zwei getrennte Field-Segmente -->
  <polygon
    id="segment-FIELD-1"
    points="0,0 100,0 50,25"
    fill="#7fbf6a"
    data-kind="FIELD"
  />

  <polygon
    id="segment-FIELD-2"
    points="0,100 100,100 50,75"
    fill="#7fbf6a"
    data-kind="FIELD"
  />
  <polygon id="shield" points="75,46 83,46 83,52 79,55 75,52" fill="#E8D48A" stroke="#9A7F4A" stroke-width="1"/>
</svg>
